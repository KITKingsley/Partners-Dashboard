<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | Partners Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=20260608a">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel" aria-label="Sign in">
        <div class="auth-brand">
          <img src="Gametize App Logo.png" alt="">
          <div>
            <p class="eyebrow">Partners Dashboard</p>
            <h1>Sign in</h1>
          </div>
        </div>

        <form id="signInForm" class="auth-form">
          <label>
            Email
            <input id="emailInput" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <span class="password-field">
              <input id="passwordInput" type="password" autocomplete="current-password" required>
              <button id="togglePasswordButton" class="password-toggle" type="button" aria-label="Show password" title="Show password">
                <svg class="eye-icon eye-show" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-icon eye-hide" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6a16.8 16.8 0 0 1-3.2 3.6"></path>
                  <path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
                  <path d="M4 4l16 16"></path>
                </svg>
              </button>
            </span>
          </label>
          <button id="forgotPasswordButton" class="auth-text-button" type="button">Forgot password?</button>
          <button type="submit">Sign in</button>
          <p id="authStatus" class="auth-status" role="status" aria-live="polite"></p>
          <p class="auth-switch">Need an account? <a href="signup.html">Create one</a></p>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js?v=20260608a"></script>
    <script src="supabase-auth.js?v=20260608a"></script>
    <script>
      const form = document.querySelector("#signInForm");
      const status = document.querySelector("#authStatus");
      const emailInput = document.querySelector("#emailInput");
      const passwordInput = document.querySelector("#passwordInput");
      const forgotPasswordButton = document.querySelector("#forgotPasswordButton");
      const togglePasswordButton = document.querySelector("#togglePasswordButton");

      if (!window.DashboardAuth.isConfigured()) {
        status.textContent = "Add your Supabase URL and anon key in auth-config.js to enable sign in.";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        status.textContent = "Signing in...";

        try {
          await window.DashboardAuth.signIn(emailInput.value, passwordInput.value);
          window.location.href = "index.html";
        } catch (error) {
          status.textContent = error.message;
        }
      });

      togglePasswordButton.addEventListener("click", () => {
        const showingPassword = passwordInput.type === "text";
        passwordInput.type = showingPassword ? "password" : "text";
        togglePasswordButton.classList.toggle("is-showing", !showingPassword);
        togglePasswordButton.setAttribute("aria-label", showingPassword ? "Show password" : "Hide password");
        togglePasswordButton.setAttribute("title", showingPassword ? "Show password" : "Hide password");
      });

      forgotPasswordButton.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        if (!email) {
          status.textContent = "Enter your email first, then click Forgot password.";
          emailInput.focus();
          return;
        }

        status.textContent = "Sending password reset email...";

        try {
          await window.DashboardAuth.resetPassword(email);
          status.textContent = "Password reset email sent. Check your inbox.";
        } catch (error) {
          status.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
