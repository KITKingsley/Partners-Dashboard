<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | Partners Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=20260610a">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel" aria-label="Sign in">
        <div class="auth-brand">
          <img src="Gametize App Logo.png" alt="">
          <div>
            <p class="eyebrow">Partners Dashboard</p>
            <h1>Sign in</h1>
          </div>
        </div>

        <form id="signInForm" class="auth-form">
          <label>
            Email
            <input id="emailInput" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <span class="password-field">
              <input id="passwordInput" type="password" autocomplete="current-password" required>
              <button id="togglePasswordButton" class="password-toggle" type="button" aria-label="Show password" title="Show password">
                <svg class="eye-icon eye-show" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-icon eye-hide" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6a16.8 16.8 0 0 1-3.2 3.6"></path>
                  <path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
                  <path d="M4 4l16 16"></path>
                </svg>
              </button>
            </span>
          </label>
          <button id="forgotPasswordButton" class="auth-text-button" type="button">Forgot password?</button>
          <button type="submit">Sign in</button>
          <div class="auth-divider" aria-hidden="true"><span>or</span></div>
          <button id="googleSignInButton" class="auth-google-button" type="button">
            <svg class="auth-google-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"></path>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
            </svg>
            Sign in with Google
          </button>
          <p id="authStatus" class="auth-status" role="status" aria-live="polite"></p>
          <p class="auth-switch">Need an account? <a href="signup.html">Create one</a></p>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js?v=20260613a"></script>
    <script src="supabase-auth.js?v=20260613a"></script>
    <script>
      const form = document.querySelector("#signInForm");
      const status = document.querySelector("#authStatus");
      const authError = new URLSearchParams(window.location.search).get("error");

      if (authError === "domain") {
        status.textContent = "Access is limited to @gametize.com Google accounts.";
      } else if (authError === "oauth") {
        status.textContent = "Google sign in failed. Please try again.";
      }

      (async () => {
        if (!window.DashboardAuth?.handleAuthRedirect) return;

        try {
          const handled = await window.DashboardAuth.handleAuthRedirect();
          if (handled) {
            window.location.replace("index.html");
          }
        } catch (error) {
          status.textContent = error.message || "Could not complete sign in from email link.";
        }
      })();
      const emailInput = document.querySelector("#emailInput");
      const passwordInput = document.querySelector("#passwordInput");
      const forgotPasswordButton = document.querySelector("#forgotPasswordButton");
      const togglePasswordButton = document.querySelector("#togglePasswordButton");
      const googleSignInButton = document.querySelector("#googleSignInButton");

      if (!window.DashboardAuth.isConfigured()) {
        status.textContent = "Add your Supabase URL and anon key in auth-config.js to enable sign in.";
      }

      googleSignInButton.addEventListener("click", async () => {
        status.textContent = "Redirecting to Google...";
        googleSignInButton.disabled = true;

        try {
          await window.DashboardAuth.signInWithGoogle();
        } catch (error) {
          status.textContent = error.message;
          googleSignInButton.disabled = false;
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        status.textContent = "Signing in...";

        try {
          await window.DashboardAuth.signIn(emailInput.value, passwordInput.value);
          window.location.href = "index.html";
        } catch (error) {
          status.textContent = error.message;
        }
      });

      togglePasswordButton.addEventListener("click", () => {
        const showingPassword = passwordInput.type === "text";
        passwordInput.type = showingPassword ? "password" : "text";
        togglePasswordButton.classList.toggle("is-showing", !showingPassword);
        togglePasswordButton.setAttribute("aria-label", showingPassword ? "Show password" : "Hide password");
        togglePasswordButton.setAttribute("title", showingPassword ? "Show password" : "Hide password");
      });

      forgotPasswordButton.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        if (!email) {
          status.textContent = "Enter your email first, then click Forgot password.";
          emailInput.focus();
          return;
        }

        status.textContent = "Sending password reset email...";

        try {
          await window.DashboardAuth.resetPassword(email);
          status.textContent = "Password reset email sent. Check your inbox.";
        } catch (error) {
          status.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
